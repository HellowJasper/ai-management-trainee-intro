<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI创新黑客松 · 大屏</title>
    <link rel="stylesheet" href="./styles.css?v=20260616-02" />
    <link rel="stylesheet" href="./src/screen.css?v=20260616-04" />
    <link rel="stylesheet" href="./src/screen-pages.css?v=20260616-05" />
  </head>
  <body class="screen-body">
    <canvas class="code-rain-canvas" id="screenRain" aria-hidden="true"></canvas>
    <div class="stage-vignette" aria-hidden="true"></div>
    <div class="screen-scanlines" aria-hidden="true"></div>

    <main class="screen-stage" id="screenStage" aria-live="polite"></main>

    <div class="deck-bar" id="deckBar">
      <button class="deck-btn" id="deckPrev" type="button" aria-label="上一屏">‹</button>
      <span class="deck-label" id="deckLabel">01 / 08</span>
      <div class="deck-dots" id="deckDots"></div>
      <button class="deck-btn" id="deckNext" type="button" aria-label="下一屏">›</button>
      <button class="deck-btn deck-fs" id="deckFs" type="button" aria-label="全屏">⤢</button>
    </div>

    <script src="./src/code-rain.js?v=20260616-02"></script>
    <script src="./src/screen-data.js?v=20260616-03"></script>
    <script src="./src/screen.js?v=20260616-04"></script>
  </body>
</html>
